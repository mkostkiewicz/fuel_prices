supabase_fuel_data_table:
  schema: fuel_data
  table: data
  columns:
    - name: id
      type: bigint
      sql_type: "bigint generated by default as identity"
      nullable: false
      identity: true
      primary_key: true
    - name: created_at
      type: timestamp with time zone
      sql_type: "timestamp with time zone"
      nullable: false
      default: now()
    - name: price_date
      type: date
      sql_type: date
      nullable: false
      unique: true
    - name: price_pb95
      type: numeric
      sql_type: numeric
      nullable: true
    - name: price_pb98
      type: numeric
      sql_type: numeric
      nullable: true
    - name: price_on
      type: numeric
      sql_type: numeric
      nullable: true
  constraints:
    - name: data_pkey
      type: primary_key
      columns: [id]
    - name: data_date_key
      type: unique
      columns: [price_date]
  tablespace: pg_default
